# ==============================================================================
# CONFIGURAÇÃO DE PRE-COMMIT - WEDDING MANAGEMENT (OTIMIZADO)
# ==============================================================================
# O objetivo disto é feedback instantâneo. Build e testes demorados pertencem ao CI.

repos:
  # ----------------------------------------------------------------------------
  # 1. HIGIENE UNIVERSAL
  # ----------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/src/api/generated/|^openapi\.json$|\.py$|^\.agents/|^\.claude/|^\.gemini/|^skills/
      - id: end-of-file-fixer
        exclude: ^frontend/src/api/generated/|^openapi\.json$|\.py$|^\.agents/|^\.claude/|^\.gemini/|^skills/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^\.agents/|^\.claude/|^\.gemini/|^skills/
      - id: check-merge-conflict
      - id: debug-statements

  # ----------------------------------------------------------------------------
  # 2. QUALIDADE DE CÓDIGO PYTHON (Ruff)
  # ----------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^\.agents/|^\.claude/|^\.gemini/|^skills/
      - id: ruff-format
        exclude: ^\.agents/|^\.claude/|^\.gemini/|^skills/

  # ----------------------------------------------------------------------------
  # 3. SEGURANÇA (Secrets)
  # ----------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: .*/tests/.*|backend/uv.lock|^\.agents/|^\.claude/|^\.gemini/|^skills/|skills-lock\.json

  # ----------------------------------------------------------------------------
  # 4. INTEGRIDADE LOCAL E LINTING O(1)
  # ----------------------------------------------------------------------------
  - repo: local
    hooks:
      # --- FRONTEND ---
      - id: frontend-lint
        name: ⚛️ React Lint (Fast)
        entry: bash -c "cd frontend && npx eslint --fix"
        language: system
        types_or: [javascript, jsx, ts, tsx]
        files: ^frontend/src/

      # --- BACKEND MIGRATIONS ---
      - id: check-migrations
        name: 🐍 Django Check Migrations
        entry: bash -c "cd backend && uv run python manage.py makemigrations --check --dry-run"
        language: system
        pass_filenames: false
        files: ^backend/.*models\.py$
