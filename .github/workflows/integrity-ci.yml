name: Integrity CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------------------
  # JOB 0: DETECT PATHS TO OPTIMIZE DEPLOYMENTS
  # ----------------------------------------------------------------------------
  detect-changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/integrity-ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/integrity-ci.yml'
            landing:
              - 'landing/**'
              - '.github/workflows/integrity-ci.yml'

  # ----------------------------------------------------------------------------
  # JOB 1: STATIC ANALYSIS
  # ----------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install UV
        if: needs.detect-changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Backend Lint (Ruff)
        if: needs.detect-changes.outputs.backend == 'true'
        run: cd backend && uv run ruff check . && uv run ruff format --check .

      - name: Backend Type Check (mypy)
        if: needs.detect-changes.outputs.backend == 'true'
        env:
          SECRET_KEY: dummy-ci-key-for-static-analysis-only # pragma: allowlist secret
        run: cd backend && uv run mypy . --show-error-codes --no-color-output

      - name: Frontend Lint & TypeCheck
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run type-check

  # ----------------------------------------------------------------------------
  # JOB 2: BACKEND INTEGRITY
  # ----------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests & Migrations
    needs: [detect-changes, lint]
    if: ! failure() && ! cancelled() && needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: django-ci-secret-key-not-for-production # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python & UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: "backend/uv.lock"
      - name: Django Integrity Check
        run: |
          cd backend
          uv run python manage.py check
          uv run python manage.py makemigrations --check --dry-run
          uv run python manage.py migrate --noinput
      - name: Pytest
        run: cd backend && uv run pytest --cov=apps --cov-report=term -v

  # ----------------------------------------------------------------------------
  # JOB 3: FRONTEND INTEGRITY
  # ----------------------------------------------------------------------------
  frontend-tests:
    name: Frontend Unit Tests
    needs: [detect-changes, lint]
    if: ! failure() && ! cancelled() && needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Test (build + unit)
        run: |
          cd frontend
          npm ci
          npm run test:ci

  # ----------------------------------------------------------------------------
  # JOB 3.5: LANDING INTEGRITY
  # ----------------------------------------------------------------------------
  landing-check:
    name: Landing Page Check
    needs: detect-changes
    if: ! failure() && ! cancelled() && needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json
      - name: Install & Check (build + lint)
        run: |
          cd landing
          npm ci
          npx astro check
          npm run build

  # ----------------------------------------------------------------------------
  # JOB 4: CONTRACT VALIDATION (Runs if either backend or frontend changed)
  # ----------------------------------------------------------------------------
  contract-sync:
    name: API Contract Sync
    needs: [detect-changes, backend-tests, frontend-tests]
    if: |
      ! failure() && ! cancelled() &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: django-ci-secret-key-not-for-production # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v6
      - name: Setup Tools (UV & Node)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate OpenAPI & Orval Sync
        run: |
          cd backend && uv run python manage.py export_openapi_schema --api config.api.api --output ../openapi.json
          cd ../frontend && npm ci && npm run generate:api
          git diff --exit-code || (echo "❌ SCHEMA DESATUALIZADO. Rode 'make sync-api' localmente." && exit 1)

  # ----------------------------------------------------------------------------
  # JOB 5: CONTINUOUS DEPLOYMENT (GCP Cloud Run)
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run / Test Build
    needs: [detect-changes, contract-sync]
    if: |
      ! failure() && ! cancelled() &&
      needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Test Docker Build (PR)
        if: github.event_name == 'pull_request'
        run: cd backend && docker build --target production --build-arg BUILD_SECRET_KEY=dummy-build-key-not-for-runtime . # pragma: allowlist secret

      - name: Google Auth
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0194045282

      - name: Deploy to Cloud Run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          gcloud run deploy wedding-backend \
            --project gen-lang-client-0194045282 \
            --source ./backend \
            --region us-central1 \
            --allow-unauthenticated \
            --concurrency 15 \
            --set-env-vars='^|^DATABASE_URL='"${DATABASE_URL}"'|SECRET_KEY='"${SECRET_KEY}"'|ALLOWED_HOSTS=api.simaceito.site,simaceito.site,www.simaceito.site,app.simaceito.site,.run.app,localhost|DJANGO_SETTINGS_MODULE=config.settings.production|CORS_ALLOWED_ORIGINS=https://simaceito.site,https://www.simaceito.site,https://app.simaceito.site' \
            --quiet

  # ----------------------------------------------------------------------------
  # JOB 6: VERCEL DEPLOY (Frontend React App)
  # ----------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [detect-changes, contract-sync]
    if: |
      ! failure() && ! cancelled() &&
      needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set Vercel Env
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "type=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "type=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Vercel build
        uses: actions/cache@v4
        with:
          path: .vercel/cache
          key: ${{ runner.os }}-vercel-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vercel-frontend-

      # Note: Run Vercel CLI from repository root to prevent path doubling issues in monorepos.
      # It relies on "Root Directory" configured in the Vercel Dashboard project settings.
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ steps.env.outputs.type }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

      - name: Build Project Artifacts
        run: vercel build ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

      - name: Deploy Artifacts to Vercel
        run: vercel deploy --prebuilt ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

  # ----------------------------------------------------------------------------
  # JOB 7: VERCEL DEPLOY (Landing Page Astro) - DEPENDS ON LANDING-CHECK
  # ----------------------------------------------------------------------------
  deploy-landing:
    name: Deploy Landing to Vercel
    needs: [detect-changes, landing-check]
    if: |
      ! failure() && ! cancelled() &&
      needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set Vercel Env
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "type=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "type=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Vercel build
        uses: actions/cache@v4
        with:
          path: .vercel/cache
          key: ${{ runner.os }}-vercel-landing-${{ hashFiles('landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vercel-landing-

      # Note: Run Vercel CLI from repository root to prevent path doubling issues in monorepos.
      # It relies on "Root Directory" configured in the Vercel Dashboard project settings.
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ steps.env.outputs.type }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

      - name: Build Project Artifacts
        run: vercel build ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

      - name: Deploy Artifacts to Vercel
        run: vercel deploy --prebuilt ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}
