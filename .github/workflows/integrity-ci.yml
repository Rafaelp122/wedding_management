name: Integrity CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------------------
  # JOB 0: DETECT PATHS TO OPTIMIZE DEPLOYMENTS
  # ----------------------------------------------------------------------------
  detect-changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/integrity-ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/integrity-ci.yml'
            landing:
              - 'landing/**'
              - '.github/workflows/integrity-ci.yml'

  # ----------------------------------------------------------------------------
  # JOB 1: STATIC ANALYSIS
  # ----------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install UV
        if: needs.detect-changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Backend Lint (Ruff)
        if: needs.detect-changes.outputs.backend == 'true'
        run: cd backend && uv run ruff check . && uv run ruff format --check .

      - name: Backend Type Check (mypy)
        if: needs.detect-changes.outputs.backend == 'true'
        env:
          SECRET_KEY: dummy-ci-key-for-static-analysis-only # pragma: allowlist secret
        run: cd backend && uv run mypy . --show-error-codes --no-color-output

      - name: Frontend Lint & TypeCheck
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run type-check

  # ----------------------------------------------------------------------------
  # JOB 2: BACKEND INTEGRITY
  # ----------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests & Migrations
    needs: [detect-changes, lint]
    if: always() && needs.detect-changes.outputs.backend == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: django-ci-secret-key-not-for-production # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python & UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: "backend/uv.lock"
      - name: Django Integrity Check
        run: |
          cd backend
          uv run python manage.py check
          uv run python manage.py makemigrations --check --dry-run
          uv run python manage.py migrate --noinput
      - name: Pytest
        run: cd backend && uv run pytest --cov=apps --cov-report=term -v

  # ----------------------------------------------------------------------------
  # JOB 3: FRONTEND INTEGRITY
  # ----------------------------------------------------------------------------
  frontend-tests:
    name: Frontend Unit Tests
    needs: [detect-changes, lint]
    if: always() && needs.detect-changes.outputs.frontend == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Test (build + unit)
        run: |
          cd frontend
          npm ci
          npm run test:ci

  # ----------------------------------------------------------------------------
  # JOB 4: CONTRACT VALIDATION (Runs if either backend or frontend changed)
  # ----------------------------------------------------------------------------
  contract-sync:
    name: API Contract Sync
    needs: [detect-changes, backend-tests, frontend-tests]
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true') &&
      (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped') &&
      (needs.frontend-tests.result == 'success' || needs.frontend-tests.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: django-ci-secret-key-not-for-production # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
      - name: Setup Tools (UV & Node)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate OpenAPI & Orval Sync
        run: |
          cd backend && uv run python manage.py export_openapi_schema --api config.api.api --output ../openapi.json
          cd ../frontend && npm ci && npm run generate:api
          git diff --exit-code || (echo "❌ SCHEMA DESATUALIZADO. Rode 'make sync-api' localmente." && exit 1)

  # ----------------------------------------------------------------------------
  # JOB 5: CONTINUOUS DEPLOYMENT (GCP Cloud Run)
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    needs: [detect-changes, contract-sync]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect-changes.outputs.backend == 'true' &&
      (needs.contract-sync.result == 'success' || needs.contract-sync.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0194045282
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy wedding-backend \
            --project gen-lang-client-0194045282 \
            --source ./backend \
            --region us-central1 \
            --allow-unauthenticated \
            --concurrency 15 \
            --set-env-vars='^|^DATABASE_URL=${{ secrets.DATABASE_URL }}|SECRET_KEY=${{ secrets.SECRET_KEY }}|ALLOWED_HOSTS=api.simaceito.site,simaceito.site,www.simaceito.site,app.simaceito.site,.run.app,localhost|DJANGO_SETTINGS_MODULE=config.settings.production|CORS_ALLOWED_ORIGINS=https://simaceito.site,https://www.simaceito.site,https://app.simaceito.site' \
            --quiet

  # ----------------------------------------------------------------------------
  # JOB 6: VERCEL DEPLOY (Frontend React App)
  # ----------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [detect-changes, contract-sync]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.contract-sync.result == 'success' || needs.contract-sync.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install --global vercel
      # Note: Run Vercel CLI from repository root to prevent path doubling issues in monorepos.
      # It relies on "Root Directory" configured in the Vercel Dashboard project settings.
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
      - name: Deploy Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

  # ----------------------------------------------------------------------------
  # JOB 7: VERCEL DEPLOY (Landing Page Astro) - INDEPENDENT OF CONTRACT-SYNC
  # ----------------------------------------------------------------------------
  deploy-landing:
    name: Deploy Landing to Vercel
    needs: detect-changes
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json
      - name: Install Vercel CLI
        run: npm install --global vercel
      # Note: Run Vercel CLI from repository root to prevent path doubling issues in monorepos.
      # It relies on "Root Directory" configured in the Vercel Dashboard project settings.
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}
      - name: Deploy Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}
