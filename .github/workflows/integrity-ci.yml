name: Integrity CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------------------
  # JOB 0: DETECT PATHS TO OPTIMIZE DEPLOYMENTS
  # ----------------------------------------------------------------------------
  detect-changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/integrity-ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/integrity-ci.yml'
            landing:
              - 'landing/**'
              - '.github/workflows/integrity-ci.yml'

  # ----------------------------------------------------------------------------
  # JOB 1: STATIC ANALYSIS
  # ----------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup PNPM
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install UV
        if: needs.detect-changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Backend Lint (Ruff)
        if: needs.detect-changes.outputs.backend == 'true'
        run: cd backend && uv run ruff check . && uv run ruff format --check .

      - name: Backend Type Check (mypy)
        if: needs.detect-changes.outputs.backend == 'true'
        env:
          SECRET_KEY: dummy-ci-key-for-static-analysis-only # pragma: allowlist secret
        run: cd backend && uv run mypy . --show-error-codes --no-color-output

      - name: Cache Node Modules (Frontend)
        if: needs.detect-changes.outputs.frontend == 'true'
        id: cache-node-modules-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Frontend Dependencies
        if: needs.detect-changes.outputs.frontend == 'true' && steps.cache-node-modules-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Frontend Lint & TypeCheck
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          cd frontend
          pnpm run lint
          pnpm run type-check

  # ----------------------------------------------------------------------------
  # JOB 2: BACKEND INTEGRITY
  # ----------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests & Migrations
    needs: detect-changes
    if: success() && needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: django-ci-secret-key-not-for-production # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python & UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: "backend/uv.lock"
      - name: Django Integrity Check
        run: |
          cd backend
          uv run python manage.py check
          uv run python manage.py makemigrations --check --dry-run
          uv run python manage.py migrate --noinput
      - name: Pytest
        run: cd backend && uv run pytest --cov=apps --cov-report=term --cov-report=xml -v

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ----------------------------------------------------------------------------
  # JOB 3: FRONTEND INTEGRITY
  # ----------------------------------------------------------------------------
  frontend-tests:
    name: Frontend Unit Tests
    needs: detect-changes
    if: success() && needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Cache Node Modules
        id: cache-node-modules-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.cache-node-modules-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Test
        run: |
          node --version
          cd frontend
          pnpm run test:ci

      - name: Check API Mock Isolation
        run: |
          if grep -rn 'vi\.mock.*@/api/generated' frontend/src/ --include='*.test.*' | grep -v '/test-setup.ts'; then
            echo "ERROR: vi.mock of @/api/generated found in test file. All API mocks must be in test-setup.ts."
            exit 1
          fi
          echo "All API mocks are properly centralized."

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
  # ----------------------------------------------------------------------------
  # JOB 3.4: PLAYWRIGHT E2E INTEGRITY
  # ----------------------------------------------------------------------------
  e2e-tests:
    name: Playwright E2E Tests - Shard ${{ matrix.shard }}/2
    needs: detect-changes
    if: success() && needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python & UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: "backend/uv.lock"

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Cache Node Modules
        id: cache-node-modules-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Frontend Dependencies
        if: steps.cache-node-modules-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Start Django Backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: db.sqlite3
          SECRET_KEY: e2e-ci-key # pragma: allowlist secret
        run: |
          cd backend
          uv run python manage.py migrate --noinput
          uv run python manage.py seed_db
          .venv/bin/python manage.py runserver 8000 &

      - name: Wait for Backend
        run: |
          until curl -s http://localhost:8000/api/v1/docs > /dev/null; do
            echo "Waiting for Django backend to be ready..."
            sleep 1
          done
          echo "Django backend is ready!"

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers and Deps
        run: |
          cd frontend
          if [ "${{ steps.cache-playwright.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps
          else
            pnpm exec playwright install --with-deps
          fi

      - name: Run Playwright tests
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          cd frontend
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm exec playwright test --grep "@smoke" --shard=${{ matrix.shard }}/2
          else
            pnpm exec playwright test --grep "@smoke|@critical" --shard=${{ matrix.shard }}/2
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          if-no-files-found: ignore

  # ----------------------------------------------------------------------------
  # JOB 3.5: LANDING INTEGRITY
  # ----------------------------------------------------------------------------
  landing-check:
    name: Landing Page Check
    needs: detect-changes
    if: success() && needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: landing/pnpm-lock.yaml
      - name: Cache Node Modules
        id: cache-node-modules-landing
        uses: actions/cache@v4
        with:
          path: landing/node_modules
          key: node-modules-landing-${{ hashFiles('landing/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.cache-node-modules-landing.outputs.cache-hit != 'true'
        run: |
          cd landing
          pnpm install --frozen-lockfile

      - name: Check (build + lint)
        run: |
          cd landing
          pnpm exec astro check
          pnpm run build

  # ----------------------------------------------------------------------------
  # JOB 4: CONTRACT VALIDATION (Runs if either backend or frontend changed)
  # ----------------------------------------------------------------------------
  contract-sync:
    name: API Contract Sync
    needs: [detect-changes]
    if: |
      success() &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: django-ci-secret-key-not-for-production # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v6
      - name: Setup Tools (UV & Node)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Cache Node Modules (Frontend)
        id: cache-node-modules-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Frontend Dependencies
        if: steps.cache-node-modules-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Validate OpenAPI & Orval Sync
        run: |
          cd backend && uv run python manage.py export_openapi_schema --api config.api.api --output ../openapi.json --indent 2
          cd ../frontend && pnpm run generate:api
          git diff --exit-code || (echo "❌ SCHEMA DESATUALIZADO. Rode 'make sync-api' localmente." && exit 1)

  # ----------------------------------------------------------------------------
  # JOB 5: CONTINUOUS DEPLOYMENT (GCP Cloud Run)
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run / Test Build
    needs: [detect-changes, backend-tests, contract-sync]
    if: |
      success() &&
      needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Test Docker Build (PR)
        if: github.event_name == 'pull_request'
        run: cd backend && docker build --target production --build-arg BUILD_SECRET_KEY=dummy-build-key-not-for-runtime . # pragma: allowlist secret

      - name: Google Auth
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0194045282

      - name: Install UV
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Run Database Migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DJANGO_SETTINGS_MODULE: config.settings.production
        run: |
          cd backend
          uv run python manage.py migrate --noinput

      - name: Deploy to Cloud Run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          gcloud run deploy wedding-backend \
            --project gen-lang-client-0194045282 \
            --source ./backend \
            --region us-central1 \
            --allow-unauthenticated \
            --concurrency 15 \
            --cpu-boost \
            --set-env-vars='^|^DATABASE_URL='"${DATABASE_URL}"'|SECRET_KEY='"${SECRET_KEY}"'|R2_ACCESS_KEY_ID='"${R2_ACCESS_KEY_ID}"'|R2_SECRET_ACCESS_KEY='"${R2_SECRET_ACCESS_KEY}"'|R2_BUCKET='"${R2_BUCKET}"'|R2_ENDPOINT_URL='"${R2_ENDPOINT_URL}"'|ALLOWED_HOSTS=api.simaceito.site,simaceito.site,www.simaceito.site,app.simaceito.site,.run.app,localhost|DJANGO_SETTINGS_MODULE=config.settings.production|CORS_ALLOWED_ORIGINS=https://simaceito.site,https://www.simaceito.site,https://app.simaceito.site' \
            --quiet

  # ----------------------------------------------------------------------------
  # JOB 6: VERCEL DEPLOY (Frontend React App)
  # ----------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [detect-changes, frontend-tests, contract-sync]
    if: |
      success() &&
      needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: pnpm install --global vercel@latest

      - name: Set Vercel Env
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "type=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "type=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      # Note: Run Vercel CLI from repository root to prevent path doubling issues in monorepos.
      # It relies on "Root Directory" configured in the Vercel Dashboard project settings.
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ steps.env.outputs.type }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

      - name: Build Project Artifacts
        run: vercel build ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

      - name: Deploy Artifacts to Vercel
        run: vercel deploy --prebuilt ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

  # ----------------------------------------------------------------------------
  # JOB 7: VERCEL DEPLOY (Landing Page Astro) - DEPENDS ON LANDING-CHECK
  # ----------------------------------------------------------------------------
  deploy-landing:
    name: Deploy Landing to Vercel
    needs: [detect-changes, landing-check]
    if: |
      success() &&
      needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: landing/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: pnpm install --global vercel@latest

      - name: Set Vercel Env
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "type=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "type=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      # Note: Run Vercel CLI from repository root to prevent path doubling issues in monorepos.
      # It relies on "Root Directory" configured in the Vercel Dashboard project settings.
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ steps.env.outputs.type }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

      - name: Build Project Artifacts
        run: vercel build ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

      - name: Deploy Artifacts to Vercel
        run: vercel deploy --prebuilt ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

  # ----------------------------------------------------------------------------
  # JOB 8: AI CODE REVIEW (PR only, once per PR via label guard)
  # ----------------------------------------------------------------------------
  review:
    name: AI Code Review
    needs: [detect-changes, backend-tests, frontend-tests, landing-check]
    if: |
      github.event_name == 'pull_request' &&
      !failure() &&
      !cancelled() &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check Existing Review
        id: label-check
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          LABELS=$(gh api "/repos/${{ github.repository }}/issues/$PR_NUMBER/labels" --jq '[.[].name]')
          if echo "$LABELS" | grep -q '"ai-reviewed"'; then
            echo "PR already has 'ai-reviewed' label. Skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run OpenCode Reviewer
        if: steps.label-check.outputs.skip != 'true'
        uses: anomalyco/opencode/github@v1.16.2
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-pro
          prompt: |
            Revise este pull request seguindo estritamente as regras de arquitetura, qualidade e testes do projeto:
            1. Diretrizes gerais: `AGENTS.md`
            2. Regras de Backend (Django Ninja, Service Layer, Multi-tenancy, Exceptions, Validações): `.agents/skills/wedding-backend/SKILL.md`
            3. Regras de Frontend (React, Vite, Orval hooks, React Hook Form + Zod, Zustand): `.agents/skills/wedding-frontend/SKILL.md`
            4. Regras de Negócio (Finanças, Logística, Scheduler): `.agents/skills/wedding-business-rules/SKILL.md`
            5. Padrões de Testes:
              - Backend (Pytest, factories, mocks): `.agents/skills/wedding-backend-testing/SKILL.md`
              - Frontend (Vitest, RTL, MSW): `.agents/skills/wedding-frontend-testing/SKILL.md`
            6. Padrões de Documentação:
              - Seguir estritamente as diretrizes de `docs/COMMENTING_STANDARDS.md`.
              - Idioma: Comentários inline e docstrings devem ser escritos em Português (PT-BR).
              - Backend (apps/):
                - Métodos públicos/complexos em services.py exigem docstrings em estilo Google Style.
                - Endpoints em api.py precisam de operation_id e docstrings curtas (1-2 linhas).
                - Modelos precisam de docstring de classe descritiva e campos com help_text.
                - Mudanças estruturais importantes ou novos padrões exigem ADR em docs/ADR/ (ver ADR-021).
                - É terminantemente PROIBIDO incluir referências a assistentes de codificação ou geradores nos comentários (ex: Bolt, Jules, Copilot).
              - Frontend (src/): hooks, tipos e utils exportados em features/ precisam de JSDoc.
                Stores Zustand precisam de comentário descrevendo o estado gerenciado.

            IMPORTANTE — O pipeline de CI já executou lint, type-check e todos os testes
            (backend + frontend) com sucesso antes desta revisão. NÃO execute comandos
            de teste, build, lint ou type-check. Assuma que o código compila e testa
            corretamente. Foque exclusivamente na revisão estática do diff.

            Foque em apontar:
            - Desvios arquiteturais (ex: lógica fora de services.py, falta de filtro de tenant, endpoints sem operation_id).
            - Falhas de segurança, concorrência ou performance (como queries N+1, secrets em código).
            - Falta de testes obrigatórios ou desvios de padrões de escrita.
            - Pendências de documentação (docstring, JSDoc, help_text, ADRs faltantes).
            - Seja conciso e direto ao ponto ao fazer os apontamentos.

      - name: Mark PR as Reviewed
        if: success()
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh label create "ai-reviewed" --color "0e8a16" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "ai-reviewed"
          echo "✓ Added 'ai-reviewed' label to PR #$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
