name: opencode-magi-review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write       # Alterado para write caso o agente editor precise comitar correções automáticas
      pull-requests: write  # Alterado para write para permitir que o conselho do Magi poste as revisões
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # Mantido em 0 para garantir que o histórico completo de commits seja avaliado no diff

      - name: Run OpenCode Magi Consensus
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Alterado para opencode-go para usar a chave e plano OpenCode Go
          model: opencode-go/deepseek-v4-pro
          use_github_token: true
          prompt: |
            Inicie a orquestração do OpenCode Magi para este Pull Request.
            - Reúna a banca de revisores (Melchior, Balthasar e Casper).
            - Execute o ciclo completo de revisão multi-agent por maioria de votos.
            - Valide os apontamentos (Finding-level voting) antes de publicar.
