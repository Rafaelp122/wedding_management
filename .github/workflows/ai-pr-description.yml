name: AI PR Description

on:
  pull_request:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  generate:
    name: AI Description Generator
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check if description needed
        id: check
        env:
          CURRENT_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 -c '
          import os, sys
          body = os.environ.get("CURRENT_BODY", "")
          if not body.strip():
              print("empty=true")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("empty=true\n")
              sys.exit(0)

          desc_part = body.split("## 🛠️ Checklist")[0] if "## 🛠️ Checklist" in body else body
          lines = [line.strip() for line in desc_part.splitlines()]
          clean_lines = []
          for line in lines:
              if not line:
                  continue
              if line.startswith("###") or line.startswith("<!--"):
                  continue
              if line == "-" or line == "-  " or line == "- ":
                  continue
              clean_lines.append(line)

          clean_desc = "".join(clean_lines).strip()
          is_empty = "true" if not clean_desc else "false"
          print(f"Check results: empty={is_empty}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"empty={is_empty}\n")
          '

      - name: Checkout repository
        if: steps.check.outputs.empty == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate PR Description
        if: steps.check.outputs.empty == 'true'
        uses: anomalyco/opencode/github@v1.16.2
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          prompt: |
            Sua única tarefa: preencher as seções de descrição do Pull Request e atualizar o corpo do PR.

            NÃO revise código. NÃO comente no PR. NÃO modifique arquivos. NÃO crie branches.
            Apenas edite o corpo do PR.

            O corpo do PR atual é fornecido abaixo. Ele contém o template com checklists de qualidade e guias de uso que DEVEM SER PRESERVADOS.

            Corpo atual do PR:
            """
            ${{ github.event.pull_request.body }}
            """

            Instruções:
            1. Analise os commits e a diferença de código (diff) desta branch.
            2. Gere as descrições em português nas seções correspondentes:
               ### O que muda
               - (bullet points concisos das mudanças de infra)

               ### Por quê
               - (contexto/motivação das alterações)

               ### Como testar
               - (passos de teste no CI/local)
            3. Preserve INTEGRALMENTE as seções de checklist ("## 🛠️ Checklist do Desenvolvedor") e de guia do assistente ("## 🤖 Interagindo com o OpenCode AI Assistant"), incluindo suas caixas de seleção (ex: - [ ] ou - [x] que o desenvolvedor já possa ter preenchido).
            4. Escreva tudo em português. Conecte as descrições geradas mantendo o nível H3 (###) dos cabeçalhos.
            5. Ao finalizar, monte o corpo do PR atualizado (descrições geradas + checklist preservado + guia preservado) e execute o comando `gh pr edit` passando esse corpo final para atualizar este Pull Request.
