name: AI Docs Review

on:
  pull_request:
    types: [opened, ready_for_review]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  review:
    name: Documentation Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: anomalyco/opencode/github@v1
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          prompt: |
            Sua única tarefa: revisar a DOCUMENTAÇÃO deste Pull Request. NÃO revise lógica de código.

            Leia o diff e os arquivos alterados. Comente no PR APENAS pendências de documentação.

            Regras do projeto (segundo AGENTS.md):

            BACKEND (apps/):
            - api.py: todo endpoint precisa de operation_id (ex: weddings_list). Docstring com parâmetros e resposta.
            - services.py: toda função pública exportada precisa de docstring.
            - models.py: modelos precisam de docstring. Campos precisam de help_text.
            - Mudanças estruturais (nova app, novo pattern, refactor grande) precisam de ADR em docs/ADR/.

            FRONTEND (src/):
            - features/*/api.ts: hooks exportados precisam de JSDoc descrevendo o que fazem.
            - features/*/types.ts: tipos/interfaces exportadas precisam de comentário explicativo.
            - features/*/utils.ts: funções utilitárias exportadas precisam de JSDoc.
            - stores/: stores Zustand precisam de comentário descrevendo o estado gerenciado.

            NÃO sinalize regras de negócio como pendência de documentação (ex: desconto, validação de convidados).
            Se achar algo que PODE ser regra de negócio, comente em separado: "Possível regra de negócio em (arquivo:linha) — verificar se precisa documentar em wedding-business-rules."

            Formato do comentário (seja conciso):

            Revisão de Documentação

            Nada pendente.
            (ou)
            Pendencias:
            - [ ] apps/weddings/api.py:15 — endpoint sem operation_id
            - [ ] apps/finances/services.py:42 — funcao calculate_refund sem docstring
            - [ ] src/features/cart/types.ts:8 — tipo CartItem exportado sem comentario

            Possiveis regras de negocio (verificar manualmente):
            - apps/finances/services.py:42 — novo calculo com Decimal. Verificar se é regra de negocio.

            Se nao houver pendencias, comente apenas "Nenhuma pendencia de documentacao."

            Ao final do comentário, assine com "— 📝 Scribe (Revisor de Documentação)" em uma linha separada.
            Escreva em portugues.
